<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../Css/estilo.css">
    <title>Registro</title>
</head>
<body>
<a href="index.html" class="backButton">←</a>
<form class="form" id="form">
    <h2 id="n1">Crear Cuenta</h2>
    <label for="name">Nombre:</label>
    <input type="text" id="name" placeholder="Ingrese el nombre" minlength="3">
    <label for="username">Usuario:</label>
    <input type="text" id="username" placeholder="Ingrese el nombre de usuario">
    <label for="email">Correo Electrónico:</label>
    <input type="email" id="email" placeholder="Ingrese su correo electrónico">
    <label for="password">Contraseña:</label>
    <input type="password" id="password" placeholder="Ingrese la contraseña" minlength="6">
    <label for="confirmPassword">Confirmar Contraseña:</label>
    <input type="password" id="confirmPassword" placeholder="Confirme la contraseña">
    <div class="formBtns">
        <button type="submit">Registrarse</button>
        <button type="button" onclick="window.location.href='inicioSesion.html'">Iniciar Sesión</button>
    </div>
</form>
<script src="../Js/registro.js"></script>
</body>
</html>
